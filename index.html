*{box-sizing:border-box}html,body{width:100%;height:100%;margin:0;background:var(--bg);color:var(--ink);font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;font-size:var(--font);line-height:1.62}.app{width:100vw;height:100vh;display:grid;grid-template-columns:345px minmax(0,1fr);overflow:hidden}aside{height:100vh;overflow-y:auto;padding:22px 18px;background:linear-gradient(180deg,#fffaf2,#eee2d2);border-right:1px solid var(--line)}main{height:100vh;overflow-y:auto;padding:34px 44px 90px}.brand,.card,.hero{background:rgba(255,250,242,.96);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}.brand{padding:18px;margin-bottom:18px}.course{font-size:.78rem;font-weight:800;letter-spacing:.05em;color:var(--muted);text-transform:uppercase}h1{font-size:clamp(2.05rem,4.2vw,4rem);line-height:1.03;letter-spacing:-.045em;margin:8px 0 12px}h2{font-size:clamp(1.55rem,2.6vw,2.45rem);line-height:1.12;letter-spacing:-.035em;margin:0 0 16px}h3{font-size:1.25rem;color:var(--accent2);margin:22px 0 9px}h4{font-size:1.03rem;color:var(--accent);margin:16px 0 7px}p{margin:0 0 14px}.subtitle{font-size:1.04rem;color:var(--muted);max-width:1040px}.lang-row,.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.lang-row{margin-top:14px}button,select,input,textarea{font:inherit}button{border:0;border-radius:999px;padding:10px 14px;font-weight:800;cursor:pointer;background:var(--soft);color:var(--ink);font-size:.92rem}button:hover{filter:brightness(.98);box-shadow:0 8px 18px rgba(0,0,0,.08)}button.active,.primary{background:var(--accent2);color:#fff}button.secondary{background:var(--accent);color:#fff}.nav{display:grid;gap:8px;margin:14px 0}.nav button{width:100%;text-align:left;border-radius:16px;background:rgba(255,255,255,.78);border:1px solid var(--line);white-space:normal;line-height:1.35}.nav button.active{background:var(--accent);border-color:var(--accent);color:#fff}.nav small{display:block;font-weight:600;opacity:.82}.progress-wrap{margin:18px 0}.progress-label{display:flex;justify-content:space-between;font-size:.82rem;color:var(--muted);margin-bottom:7px}.progress-track{height:9px;background:#dfd2c0;border-radius:999px;overflow:hidden}.progress-bar{height:100%;width:0;background:var(--accent2);transition:.25s}.hero{padding:28px;margin-bottom:20px}.card{padding:24px;margin-bottom:18px;background:rgba(255,255,255,.82)}.grid{display:grid;gap:18px}.grid.two{grid-template-columns:repeat(2,minmax(0,1fr))}.grid.three{grid-template-columns:repeat(3,minmax(0,1fr))}.pill{display:inline-flex;padding:6px 11px;border-radius:999px;background:var(--soft);color:var(--accent2);font-size:.78rem;font-weight:900;letter-spacing:.04em;text-transform:uppercase;margin:0 6px 8px 0}label{display:block;font-weight:900;margin:12px 0 6px}select,input,textarea{width:100%;border:1px solid var(--line);border-radius:18px;padding:13px 14px;background:#fffdf8}textarea{min-height:135px;resize:vertical}.mini{min-height:82px}.muted{color:var(--muted)}.warning{background:var(--warn)}.success{background:var(--success)}.danger{background:var(--danger)}.blue{background:var(--blue)}.promptBox{white-space:normal;background:#fff;border:1px solid var(--line);border-radius:18px;padding:20px;margin:12px 0}.promptBox p{margin:0 0 13px}.promptBox ul,.promptBox ol{margin:8px 0 14px 1.2rem;padding:0}.promptBox li{margin:4px 0}.questionCard{background:#fff;border:1px solid var(--line);border-radius:18px;padding:18px;margin:10px 0}.questionLabel{font-weight:900;color:var(--accent2);text-transform:uppercase;letter-spacing:.04em;font-size:.8rem}.displayLine{white-space:pre-wrap;background:#fffdf8;border:1px solid var(--line);border-radius:14px;padding:10px 12px;margin:8px 0 14px;color:#3b2a1c}.footerNav{display:flex;justify-content:space-between;gap:12px;margin-top:22px}.table{width:100%;border-collapse:collapse;margin:15px 0;background:#fff;border-radius:16px;overflow:hidden}.table th,.table td{border:1px solid var(--line);padding:11px;vertical-align:top}.table th{background:var(--soft);text-align:left}.screen{max-width:1240px;margin:0 auto}.textCard{cursor:pointer;transition:.15s}.textCard:hover{transform:translateY(-2px)}.textCard.active{outline:3px solid var(--accent2);background:#f4fbf7}.toast{position:fixed;right:22px;bottom:22px;background:var(--accent2);color:#fff;padding:12px 16px;border-radius:999px;box-shadow:var(--shadow);opacity:0;transform:translateY(8px);transition:.2s;z-index:99}.toast.show{opacity:1;transform:translateY(0)}@media(max-width:1000px){body{overflow:auto}.app{display:block;height:auto;min-height:100vh;overflow:auto}aside{height:auto;max-height:none;border-right:0;border-bottom:1px solid var(--line)}main{height:auto;overflow:visible;padding:22px 18px 70px}.grid.two,.grid.three{grid-template-columns:1fr}}@media print{aside,.footerNav,.no-print,.toast{display:none!important}.app{display:block}.screen{max-width:none}main{height:auto;overflow:visible;padding:0}.card,.hero{box-shadow:none;break-inside:avoid}body{background:white}}

<script>
const DATA = {"meta": {"course": "GEK20070-01 Biblical Hermeneutics", "week": "Week15", "topic": "Revelation — Reading the Unreadable", "sources": "BH Week 15 manuscript; Fee & Stuart; Grant Osborne", "en": {"course": "GEK20070-01 · Biblical Hermeneutics · Week 15", "title": "Revelation — Reading the Unreadable", "subtitle": "Triple Genre, Historical Coding, and the Formation of Faithful Witness", "orientationTitle": "Formation Question", "orientation": "What kind of reader does Revelation require, and what must you unlearn in order to become that reader?", "claimTitle": "Governing Claim", "claim": "Revelation must first be heard as apocalyptic prophecy in epistolary form by seven first-century churches under Roman pressure. Its symbols are historically coded; its theological affirmations travel across time.", "where": "The charged Matrix Space between Rome's claim to ultimate authority and God's throne-centered claim.", "who": "Readers move from prediction consumers toward faithful witnesses (martyrs) who can hold historical particularity and theological universality together.", "what": "Interpret genre, decode symbols historically, trace literary movement, transfer theological affirmations, and embody patient endurance."}, "ko": {"course": "GEK20070-01 · 성서해석학 · 15주차", "title": "요한계시록 — 읽을 수 없다는 책 읽기", "subtitle": "삼중 장르, 역사적 상징 해독, 충실한 증인의 형성", "orientationTitle": "형성 질문", "orientation": "요한계시록은 어떤 독자를 요구하며, 그 독자가 되기 위해 무엇을 버려야 하는가?", "claimTitle": "지배적 주장", "claim": "요한계시록은 먼저 로마의 압력 아래 있던 일곱 1세기 교회가 받은 서신 형식의 묵시적 예언으로 들어야 한다. 상징은 역사적으로 부호화되어 있고, 그 상징이 운반하는 신학적 확언은 시대를 넘어 이동한다.", "where": "궁극 권위를 주장하는 로마와 보좌를 중심으로 한 하나님의 주장 사이의 긴장된 Matrix Space.", "who": "독자는 예측을 소비하는 사람에서 역사적 특수성과 신학적 보편성을 함께 붙드는 충실한 증인(μάρτυς)으로 이동한다.", "what": "장르를 식별하고, 상징을 역사적으로 해독하며, 문학적 움직임을 추적하고, 신학적 확언을 옮겨, 인내를 몸으로 구현한다."}}, "modules": [{"id": "m1", "en": {"title": "M1 — Why Revelation Is Misread", "ask": "Why does newspaper reading fail even when interpreters are sincere?", "student": "Revelation's imagery was not designed as a secret code for each later generation. The first question is what the symbols communicated to John's original churches.", "body": ["Every generation has identified its own rulers, wars, technologies, or institutions in Revelation and then watched those identifications expire. The repeated failure exposes a faulty framework, not merely a wrong guess.", "The newspaper fallacy asks what a symbol means today before asking what it meant in Roman Asia Minor. Responsible interpretation reverses that order: original communicative meaning first, analogical application second.", "Revelation is difficult because modern readers lack its symbolic vocabulary, not because God intentionally made it unintelligible. The Old Testament, Jewish apocalyptic tradition, and Roman imperial world supplied that vocabulary."], "check": ["What evidence would distinguish historical decoding from newspaper speculation?", "Which contemporary Revelation reading have you inherited without examining its method?"], "guide": "Do not begin by matching symbols to current headlines. Reconstruct the first audience's symbolic world."}, "ko": {"title": "M1 — 왜 요한계시록은 오독되는가", "ask": "해석자가 진지해도 신문식 읽기는 왜 실패하는가?", "student": "요한계시록의 이미지는 후대의 각 세대를 위한 비밀 암호로 설계되지 않았다. 첫 질문은 그 상징이 요한의 원래 교회들에 무엇을 전달했는가이다.", "body": ["모든 세대는 자기 시대의 통치자, 전쟁, 기술, 제도를 요한계시록에서 찾아냈고, 그 동일시는 시간이 지나며 무너졌다. 반복되는 실패는 단순한 추측 오류가 아니라 틀의 결함을 드러낸다.", "신문식 오류는 로마 제국의 소아시아에서 상징이 무엇을 뜻했는지 묻기 전에 오늘 무엇을 뜻하는지 묻는다. 책임 있는 해석은 순서를 뒤집는다. 먼저 원래의 의사소통 의미를 찾고, 그 다음 유비적 적용으로 이동한다.", "요한계시록이 어려운 이유는 하나님이 일부러 이해할 수 없게 만드셨기 때문이 아니라 현대 독자가 상징 어휘를 잃었기 때문이다. 구약, 유대 묵시 전통, 로마 제국 세계가 그 어휘를 제공했다."], "check": ["역사적 해독과 신문식 추측을 구별하는 증거는 무엇인가?", "당신은 어떤 현대 요한계시록 읽기를 그 방법을 검토하지 않고 물려받았는가?"], "guide": "상징을 현재 뉴스와 짝짓는 것으로 시작하지 말라. 첫 독자의 상징 세계를 재구성하라."}}, {"id": "m2", "en": {"title": "M2 — Three Genres in One", "ask": "What is lost when Revelation is treated as only apocalypse, prophecy, or epistle?", "student": "Fee & Stuart's central contribution is the triple-genre claim: apocalypse supplies the symbolic vision, prophecy supplies ethical urgency, and epistle supplies pastoral specificity.", "body": ["Apocalypse unveils heaven's account of reality to oppressed communities. Cosmic imagery declares that imperial victory is apparent rather than ultimate.", "Prophecy addresses the community now. The visions call churches to refuse compromise, endure pressure, and hear covenantal warning and promise.", "Epistle anchors the book in seven real churches with distinct situations. A reading that makes the book irrelevant to them has failed its stated address."], "check": ["Identify one signal of each genre in Revelation 1:1–8.", "How does each genre correct a characteristic misreading?"], "guide": "Keep all three genres active at once: symbolic, ethically urgent, and pastorally addressed."}, "ko": {"title": "M2 — 한 책 안의 세 장르", "ask": "요한계시록을 묵시, 예언, 서신 중 하나로만 읽으면 무엇을 잃는가?", "student": "Fee & Stuart의 중심 기여는 삼중 장르 주장이다. 묵시는 상징적 환상을, 예언은 윤리적 긴급성을, 서신은 목회적 구체성을 제공한다.", "body": ["묵시는 억압받는 공동체에게 하늘의 현실 해석을 드러낸다. 우주적 이미지는 제국의 승리가 궁극적이 아니라 겉으로 보이는 것임을 선언한다.", "예언은 지금 공동체에게 말한다. 환상은 교회가 타협을 거부하고 압력을 견디며 언약적 경고와 약속을 듣도록 부른다.", "서신은 서로 다른 상황에 놓인 실제 일곱 교회에 책을 고정한다. 그들에게 책을 무의미하게 만드는 읽기는 책이 밝힌 수신자를 실패한 것이다."], "check": ["요한계시록 1:1–8에서 각 장르의 신호 하나를 찾으라.", "각 장르는 대표적인 오독을 어떻게 수정하는가?"], "guide": "세 장르를 동시에 활성화하라. 상징적이며, 윤리적으로 긴급하고, 목회적으로 수신자에게 전달된다."}}, {"id": "m3", "en": {"title": "M3 — Historical Coding", "ask": "How did numbers, beasts, Babylon, and 666 communicate in the first century?", "student": "Symbols in Revelation arise from shared reservoirs: Scripture, Jewish apocalyptic convention, and Roman imperial experience.", "body": ["Seven signifies fullness; twelve signifies God's people; one thousand signifies vast completeness; 144,000 combines twelve by twelve by one thousand to picture the complete people of God.", "The sea beast points to Rome's blasphemous imperial power. The number 666 plausibly encodes Nero Caesar through gematria and participates in the wider Nero redivivus tradition.", "Babylon and the woman seated on seven hills transparently name Rome's idolatrous luxury, violence, and exploitative commerce. Historical reference does not exhaust the symbol, but it controls responsible transfer."], "check": ["Why is 144,000 better read symbolically than as a literal census?", "What must remain constant when Rome/Babylon is applied analogically today?"], "guide": "Historical decoding is the bridge into contemporary pattern recognition, not an obstacle to application."}, "ko": {"title": "M3 — 역사적 상징 해독", "ask": "숫자, 짐승, 바벨론, 666은 1세기에 어떻게 의사소통했는가?", "student": "요한계시록의 상징은 성경, 유대 묵시 관습, 로마 제국 경험이라는 공유된 저장고에서 나온다.", "body": ["일곱은 충만을, 열둘은 하나님의 백성을, 천은 헤아릴 수 없는 완전함을 뜻한다. 144,000은 12×12×1,000으로 하나님의 온전한 백성을 그린다.", "바다의 짐승은 로마의 신성모독적 제국 권력을 가리킨다. 666은 게마트리아를 통해 네로 카이사르를 부호화했을 가능성이 높고, 네로 재현 전승에 참여한다.", "바벨론과 일곱 언덕 위의 여인은 로마의 우상숭배적 사치, 폭력, 착취적 상업을 투명하게 명명한다. 역사적 지시가 상징을 소진하지는 않지만 책임 있는 전이를 통제한다."], "check": ["144,000을 문자적 인구 조사보다 상징적으로 읽는 것이 왜 더 타당한가?", "로마/바벨론을 오늘 유비적으로 적용할 때 무엇이 반드시 유지되어야 하는가?"], "guide": "역사적 해독은 적용의 장애물이 아니라 오늘의 패턴 인식으로 가는 다리이다."}}, {"id": "m4", "en": {"title": "M4 — Four Interpretive Schools", "ask": "What does each school see, and what does each school suppress?", "student": "Osborne maps Preterist, Historicist, Futurist, and Idealist readings so interpreters can identify the assumptions generating their conclusions.", "body": ["Preterism protects first-century meaning but can close down eschatological openness. Idealism protects recurring patterns but can detach them from John's concrete communities.", "Historicism maps visions onto successive church history, yet its confident identifications repeatedly fail. Classic futurism preserves final consummation but often evacuates chapters 4–22 of meaning for the first hearers.", "Osborne's modified preterism begins with genuine first-century referents and remains open to recurring imperial patterns and final eschatological fulfillment."], "check": ["Which school best protects the original audience, and which best protects recurring significance?", "Why is a mediating position not merely an arbitrary compromise?"], "guide": "Evaluate schools by how well they honor both original communication and the book's own eschatological horizon."}, "ko": {"title": "M4 — 네 해석 학파", "ask": "각 학파는 무엇을 보고 무엇을 억압하는가?", "student": "Osborne은 과거주의, 역사주의, 미래주의, 이상주의 읽기를 지도화하여 해석자가 결론을 생성하는 전제를 식별하게 한다.", "body": ["과거주의는 1세기 의미를 보호하지만 종말론적 개방성을 닫을 수 있다. 이상주의는 반복되는 패턴을 보호하지만 요한의 구체적 공동체에서 분리할 수 있다.", "역사주의는 환상을 연속적 교회사에 배치하지만 확신에 찬 동일시는 반복해서 실패했다. 고전적 미래주의는 최종 완성을 보존하지만 4–22장을 첫 독자에게 무의미하게 만들기 쉽다.", "Osborne의 수정 과거주의는 실제 1세기 지시에서 시작하고, 반복되는 제국 패턴과 최종 종말론적 성취에 열린 채로 남는다."], "check": ["어느 학파가 원래 청중을 가장 잘 보호하며, 어느 학파가 반복되는 의미를 가장 잘 보호하는가?", "중재적 입장이 단순한 임의적 타협이 아닌 이유는 무엇인가?"], "guide": "원래 의사소통과 책 자체의 종말론적 지평을 함께 존중하는 정도로 학파를 평가하라."}}, {"id": "m5", "en": {"title": "M5 — Literary Architecture and Old Testament Reservoir", "ask": "How do sevenfold structure, recapitulation, and Old Testament echoes guide interpretation?", "student": "Osborne supplies the literary tools needed to navigate Revelation's apparent repetition and symbolic density.", "body": ["Seven letters, seals, trumpets, and bowls use fullness as theological architecture. Structure participates in meaning.", "Progressive recapitulation reads seals, trumpets, and bowls as intensifying parallel visions of the same age rather than a simple chronological schedule.", "Daniel, Ezekiel, Isaiah, Zechariah, Exodus, and Genesis form Revelation's primary image reservoir. Intertextual fluency is more useful than contemporary speculation."], "check": ["What textual evidence supports recapitulation?", "Trace one Revelation image back to an Old Testament source and note what changes."], "guide": "Before inventing a modern referent, search the Old Testament reservoir and Revelation's internal structure."}, "ko": {"title": "M5 — 문학적 구조와 구약의 상징 저장고", "ask": "일곱 구조, 반복 재현, 구약의 메아리는 해석을 어떻게 안내하는가?", "student": "Osborne은 요한계시록의 반복처럼 보이는 구조와 상징적 밀도를 다룰 문학 도구를 제공한다.", "body": ["일곱 편지, 인, 나팔, 대접은 충만을 신학적 구조로 사용한다. 구조가 의미에 참여한다.", "점진적 반복 재현은 인, 나팔, 대접을 단순 연대기 시간표가 아니라 같은 시대를 점점 심화하여 보여 주는 평행 환상으로 읽는다.", "다니엘, 에스겔, 이사야, 스가랴, 출애굽기, 창세기가 요한계시록의 주요 이미지 저장고를 이룬다. 상호본문적 유창함이 현대적 추측보다 유용하다."], "check": ["어떤 본문 증거가 반복 재현을 지지하는가?", "요한계시록의 이미지 하나를 구약 원천으로 추적하고 무엇이 달라지는지 기록하라."], "guide": "현대 지시 대상을 발명하기 전에 구약의 저장고와 요한계시록의 내부 구조를 탐색하라."}}, {"id": "m6", "en": {"title": "M6 — Four Transferable Affirmations", "ask": "What travels across time when specific symbols remain historically bound?", "student": "Fee & Stuart locate Revelation's enduring force in four theological affirmations rather than a transferable prediction timetable.", "body": ["God is sovereign over history; Rome's apparent mastery is relativized by the throne.", "The slain-and-standing Lamb has already won the decisive victory; Revelation defines conquering through cruciform faithfulness.", "The pressured community is called to patient endurance, and evil is real, seductive, powerful, and ultimately doomed."], "check": ["State all four affirmations in your own words.", "How can an affirmation transfer without detaching it from its original symbol and situation?"], "guide": "Transfer the theological payload through historical analogy, not through one-to-one symbolic replacement."}, "ko": {"title": "M6 — 시대를 건너는 네 확언", "ask": "구체적 상징이 역사적으로 묶여 있을 때 무엇이 시대를 넘어 이동하는가?", "student": "Fee & Stuart는 요한계시록의 지속적 힘을 이동 가능한 예측 시간표가 아니라 네 신학적 확언에서 찾는다.", "body": ["하나님은 역사를 주권적으로 다스리신다. 로마의 겉보기 지배는 보좌에 의해 상대화된다.", "죽임당했으나 서 있는 어린양은 이미 결정적 승리를 이루었다. 요한계시록은 십자가적 신실함으로 이김을 정의한다.", "압력받는 공동체는 인내로 부름받고, 악은 실제적이며 매혹적이고 강력하지만 궁극적으로 멸망한다."], "check": ["네 확언을 자신의 말로 진술하라.", "확언을 원래 상징과 상황에서 분리하지 않으면서 어떻게 이동시킬 수 있는가?"], "guide": "일대일 상징 교체가 아니라 역사적 유비를 통해 신학적 핵심을 이동시키라."}}, {"id": "m7", "en": {"title": "M7 — Formation: From Prediction Consumer to Faithful Witness", "ask": "Who does Revelation form, and what embodied practice follows?", "student": "Revelation forms a community of faithful witnesses whose endurance is grounded in the Lamb's accomplished victory.", "body": ["WHERE is the Matrix Space between empire's demand and God's claim. WHO is the faithful witness (martyr), not the detached decoder. WHAT is hypomone: active steadfastness that refuses both assimilation and retaliation.", "At Handong, dominant pressure may appear through credentialing, family expectation, employment anxiety, and the demand to treat security as ultimate. These pressures are real without being sovereign.", "Formation Permanence means the reader can no longer turn Revelation into a fear-producing prediction system without recognizing the distortion. EMBODIED reading produces concrete communal allegiance, endurance, truth-telling, and noncoercive practice."], "check": ["Name the empire-like claim pressing most strongly on your community.", "What practice of endurance can your group embody without spiritualizing or coercing others?"], "guide": "The Lamb has won. Read historically, discern analogically, and practice endurance communally."}, "ko": {"title": "M7 — 형성: 예측 소비자에서 충실한 증인으로", "ask": "요한계시록은 누구를 형성하며 어떤 몸의 실천이 뒤따르는가?", "student": "요한계시록은 어린양이 이루신 승리에 근거하여 인내하는 충실한 증인 공동체를 형성한다.", "body": ["WHERE는 제국의 요구와 하나님의 주장 사이의 Matrix Space이다. WHO는 분리된 암호 해독자가 아니라 충실한 증인(μάρτυς)이다. WHAT은 동화와 보복을 함께 거부하는 능동적 견고함, ὑπομονή이다.", "한동에서 지배적 압력은 스펙 문화, 가족의 기대, 취업 불안, 안전을 궁극적인 것으로 취급하라는 요구로 나타날 수 있다. 이 압력은 실제적이지만 주권적이지 않다.", "Formation Permanence는 독자가 왜곡을 알아차리지 않고 요한계시록을 공포를 만드는 예측 체계로 되돌릴 수 없게 됨을 뜻한다. EMBODIED 읽기는 구체적 공동체 충성, 인내, 진실 말하기, 비강압적 실천을 낳는다."], "check": ["당신의 공동체를 가장 강하게 압박하는 제국적 주장을 명명하라.", "영성화하거나 다른 사람을 강압하지 않고 그룹이 몸으로 구현할 인내의 실천은 무엇인가?"], "guide": "어린양은 이기셨다. 역사적으로 읽고, 유비적으로 분별하며, 공동체적으로 인내를 실천하라."}}], "scholars": [{"name": "Fee & Stuart", "en": "Triple genre, historical coding, four transferable affirmations, and a pastoral rejection of newspaper reading.", "ko": "삼중 장르, 역사적 상징 해독, 시대를 건너는 네 확언, 신문식 읽기에 대한 목회적 거부."}, {"name": "Grant Osborne", "en": "Four schools, apocalyptic background, recapitulation, Old Testament reservoir, and a modified preterist approach with eschatological openness.", "ko": "네 학파, 묵시 배경, 반복 재현, 구약의 상징 저장고, 종말론적 개방성을 지닌 수정 과거주의."}, {"name": "John of Patmos", "en": "A pastor-prophet writing symbolic apocalypse as an epistle to seven pressured churches, forming them for faithful witness.", "ko": "압력받는 일곱 교회에 상징적 묵시를 서신으로 보내 충실한 증인으로 형성하는 목회자-예언자."}, {"name": "The First-Century Churches", "en": "Not passive background but the primary interpretive horizon: communities negotiating worship, livelihood, exclusion, and imperial allegiance.", "ko": "수동적 배경이 아니라 일차 해석 지평이다. 예배, 생계, 배제, 제국 충성의 압력 속에서 분별하는 공동체들."}], "glossary": [{"term": "Apokalypsis · 묵시", "en": "Unveiling present reality from heaven's perspective, not merely forecasting distant events.", "ko": "먼 사건을 예측하는 것만이 아니라 하늘의 관점에서 현재 현실을 드러내는 것."}, {"term": "Prophecy · 예언", "en": "Covenantal proclamation that summons present obedience, endurance, and repentance.", "ko": "현재의 순종, 인내, 회개를 요구하는 언약적 선포."}, {"term": "Epistle · 서신", "en": "Pastoral communication addressed to seven historical churches in Roman Asia.", "ko": "로마 제국의 아시아에 있던 역사적 일곱 교회에 전달된 목회적 의사소통."}, {"term": "Historical Coding · 역사적 상징 해독", "en": "Reading symbols through Scripture, Jewish apocalyptic convention, and Roman imperial context.", "ko": "성경, 유대 묵시 관습, 로마 제국 맥락을 통해 상징을 읽는 것."}, {"term": "Gematria · 게마트리아", "en": "A letter-number system relevant to the probable Nero Caesar reference of 666.", "ko": "666이 네로 카이사르를 가리킬 가능성과 관련된 문자-숫자 체계."}, {"term": "Preterist · 과거주의", "en": "Reading Revelation primarily through first-century fulfillments and referents.", "ko": "요한계시록을 주로 1세기의 성취와 지시 대상으로 읽는 접근."}, {"term": "Historicist · 역사주의", "en": "Mapping Revelation sequentially onto the whole course of church history.", "ko": "요한계시록을 전체 교회사의 연속적 단계에 대응시키는 접근."}, {"term": "Futurist · 미래주의", "en": "Locating most visions, especially after chapter 3, in events still future.", "ko": "특히 3장 이후 대부분의 환상을 아직 미래의 사건에 두는 접근."}, {"term": "Idealist · 이상주의", "en": "Reading the visions as timeless patterns of conflict between good and evil.", "ko": "환상을 선과 악의 갈등을 보여 주는 시대를 초월한 패턴으로 읽는 접근."}, {"term": "Progressive Recapitulation · 점진적 반복 재현", "en": "Parallel vision cycles revisit the same age with increasing intensity.", "ko": "평행한 환상 주기들이 같은 시대를 점점 심화하여 다시 보여 주는 구조."}, {"term": "Martys · 증인", "en": "A faithful witness whose testimony may become costly; the root of martyr.", "ko": "대가를 치를 수 있는 증언을 감당하는 충실한 증인. 순교자의 어근."}, {"term": "Hypomone · 인내", "en": "Active steadfastness under pressure without assimilation or retaliation.", "ko": "동화되거나 보복하지 않고 압력 아래 견디는 능동적 견고함."}, {"term": "Babylon · 바벨론", "en": "Revelation's prophetic name for Rome's idolatrous, violent, exploitative order.", "ko": "로마의 우상숭배적이고 폭력적이며 착취적인 질서를 가리키는 예언적 이름."}, {"term": "Slain-and-Standing Lamb · 죽임당했으나 서 있는 어린양", "en": "The book's hermeneutical center: victory accomplished through cruciform faithfulness.", "ko": "십자가적 신실함으로 이루어진 승리를 보여 주는 책의 해석학적 중심."}], "coreTexts": [{"id": "rev1", "n": 1, "dayEn": "Tuesday", "dayKo": "화요일", "refEn": "Revelation 1:1–8", "refKo": "요한계시록 1:1–8", "typeEn": "Triple-Genre Prologue", "typeKo": "삼중 장르 프롤로그", "exeEn": "Name the apocalyptic, prophetic, and epistolary signals in the prologue. What does each genre contribute to the book's original communicative purpose?", "exeKo": "프롤로그에서 묵시적, 예언적, 서신적 신호를 각각 명명하라. 각 장르는 책의 원래 의사소통 목적에 무엇을 기여하는가?", "herEn": "How does keeping all three genres active prevent Revelation from becoming either a prediction chart, generic moralism, or detached ancient correspondence?", "herKo": "세 장르를 모두 활성화하는 것은 요한계시록이 예측 도표, 일반적 도덕주의, 현실과 분리된 고대 서신으로 축소되는 것을 어떻게 막는가?", "scaffoldEn": "TEXT-WORLD → genre signal / historical code → tension under empire → revelatory movement → witness-community reshaping → embodied endurance. Keep Matrix Space between the ancient text and present practice visible.", "scaffoldKo": "본문 세계 → 장르 신호 / 역사적 상징 → 제국 아래의 긴장 → 드러냄의 움직임 → 증인 공동체 재형성 → 몸으로 구현하는 인내. 고대 본문과 오늘의 실천 사이의 Matrix Space를 보존하세요."}, {"id": "rev13", "n": 2, "dayEn": "Tuesday", "dayKo": "화요일", "refEn": "Revelation 13:1–10, 17–18", "refKo": "요한계시록 13:1–10, 17–18", "typeEn": "Beast and 666 · Historical Coding", "typeKo": "짐승과 666 · 역사적 상징 해독", "exeEn": "How do Danielic beast imagery, imperial authority, economic exclusion, and gematria locate the beast and 666 within the first-century Roman world?", "exeKo": "다니엘의 짐승 이미지, 제국 권위, 경제적 배제, 게마트리아는 짐승과 666을 1세기 로마 세계 안에 어떻게 위치시키는가?", "herEn": "After historical decoding, what contemporary structures may analogically repeat the beastly pattern of demanding ultimate allegiance and controlling participation?", "herKo": "역사적 해독 후, 궁극 충성을 요구하고 참여를 통제하는 짐승의 패턴을 어떤 현대 구조가 유비적으로 반복할 수 있는가?", "scaffoldEn": "TEXT-WORLD → genre signal / historical code → tension under empire → revelatory movement → witness-community reshaping → embodied endurance. Keep Matrix Space between the ancient text and present practice visible.", "scaffoldKo": "본문 세계 → 장르 신호 / 역사적 상징 → 제국 아래의 긴장 → 드러냄의 움직임 → 증인 공동체 재형성 → 몸으로 구현하는 인내. 고대 본문과 오늘의 실천 사이의 Matrix Space를 보존하세요."}, {"id": "rev17", "n": 3, "dayEn": "Tuesday", "dayKo": "화요일", "refEn": "Revelation 17:1–18", "refKo": "요한계시록 17:1–18", "typeEn": "Babylon/Rome · Imperial Seduction", "typeKo": "바벨론/로마 · 제국의 유혹", "exeEn": "How do the seven hills, rule over kings, luxury, commerce, and violence identify Babylon as Rome while expanding Rome into a symbolic imperial pattern?", "exeKo": "일곱 언덕, 왕들에 대한 통치, 사치, 상업, 폭력은 바벨론을 로마로 식별하면서 로마를 상징적 제국 패턴으로 어떻게 확장하는가?", "herEn": "How can communities name exploitative luxury and seductive power today without making an arbitrary one-to-one identification?", "herKo": "공동체는 임의적인 일대일 동일시를 하지 않으면서 오늘의 착취적 사치와 유혹적 권력을 어떻게 명명할 수 있는가?", "scaffoldEn": "TEXT-WORLD → genre signal / historical code → tension under empire → revelatory mov ovement → witness-community reshaping → embodied endurance. Keep Matrix Space between the ancient text and present practice visible.", "scaffoldKo": "본문 세계 → 장르 신호 / 역사적 상징 → 제국 아래의 긴장 → 드러냄의 움직임 → 증인 공동체 재형성 → 몸으로 구현하는 인내. 고대 본문과 오늘의 실천 사이의 Matrix Space를 보존하세요."}, {"id": "newcreation", "n": 6, "dayEn": "Friday", "dayKo": "금요일", "refEn": "Revelation 21:1–8", "refKo": "요한계시록 21:1–8", "typeEn": "New Creation · Theological Transfer", "typeKo": "새 창조 · 신학적 전이", "exeEn": "How do Isaiah and Ezekiel's exile imagery, the descending city, divine dwelling, and removal of death frame new creation as the book's true horizon?", "exeKo": "이사야와 에스겔의 유배 이미지, 내려오는 도성, 하나님의 거처, 죽음의 제거는 새 창조를 책의 참된 지평으로 어떻게 세우는가?", "herEn": "How does new creation relativize every present order while calling communities to anticipate material, relational, and public renewal now?", "herKo": "새 창조는 모든 현재 질서를 어떻게 상대화하면서 공동체가 지금 물질적, 관계적, 공적 갱신을 미리 살아내도록 부르는가?", "scaffoldEn": "TEXT-WORLD → genre signal / historical code → tension under empire → revelatory movement → witness-community reshaping → embodied endurance. Keep Matrix Space between the ancient text and present practice visible.", "scaffoldKo": "본문 세계 → 장르 신호 / 역사적 상징 → 제국 아래의 긴장 → 드러냄의 움직임 → 증인 공동체 재형성 → 몸으로 구현하는 인내. 고대 본문과 오늘의 실천 사이의 Matrix Space를 보존하세요."}], "mcq": [{"qEn": "What is Revelation's triple genre?", "qKo": "요한계시록의 삼중 장르는 무엇인가?", "optsEn": ["Law, history, and wisdom", "Apocalypse, prophecy, and epistle", "Gospel, parable, and hymn", "Myth, chronicle, and apocalypse"], "optsKo": ["율법, 역사, 지혜", "묵시, 예언, 서신", "복음, 비유, 찬송", "신화, 연대기, 묵시"], "a": 1}, {"qEn": "What is the correct opening question for a Revelation symbol?", "qKo": "요한계시록 상징에 대한 올바른 첫 질문은 무엇인가?", "optsEn": ["Which current leader does it predict?", "What did it communicate to the first-century churches?", "How can it support my preferred system?", "Which technology fulfills it?"], "optsKo": ["어떤 현재 지도자를 예측하는가?", "1세기 교회들에게 무엇을 전달했는가?", "내가 선호하는 체계를 어떻게 지지하는가?", "어떤 기술이 그것을 성취하는가 function setText(id){state.text=id;localStorage.setItem(LS+':text',id);render()}
function go(id){state.active=id;state.visited.add(id);localStorage.setItem(LS+':active',id);localStorage.setItem(LS+':visited',JSON.stringify([...state.visited]));render();document.getElementById('main').scrollTo({top:0,behavior:'smooth'})}
function renderChrome(){const m=DATA.meta[state.lang];document.documentElement.lang=state.lang;document.title='BH Week 15 Revelation Active Learning';document.getElementById('brandCourse').textContent=m.course;document.getElementById('brandTitle').textContent=m.title;document.getElementById('brandSub').textContent=m.subtitle;document.getElementById('progressLabel').textContent=tr('Progress','진행률');document.getElementById('enBtn').classList.toggle('active',state.lang==='en');document.getElementById('koBtn').classList.toggle('active',state.lang==='ko');let html='';navItems.forEach((n,i)=>{if(i===0)html+=`<div class="course">${tr('Stage 1 — Individual Work','1단계 — 개인 작업')}</div>`;if(i===6)html+=`<div class="course" style="margin-top:18px">${tr('Stage 2 — Group Work','2단계 — 그룹 작업')}</div>`;html+=`<button class="${state.active===n[0]?'active':''}" onclick="go('${n[0]}')">${i+1}. ${tr(n[1],n[2])}<small>${tr(n[3],n[4])}</small></button>`});document.getElementById('nav').innerHTML=html}
function updateProgress(){let completed=fields.filter(f=>get(f).trim().length>3).length;let pct=Math.min(100,Math.round(((state.visited.size/navItems.length)*0.35+(completed/fields.length)*0.65)*100));document.getElementById('progressText').textContent=pct+'%';document.getElementById('progressBar').style.width=pct+'%'}
function input(labelEn,labelKo,id,phEn='',phKo='',mini=false){return `<label>${tr(labelEn,labelKo)}</label><textarea class="${mini?'mini':''}" placeholder="${esc(tr(phEn,phKo))}" oninput="setVal('${id}',this.value)">${esc(get(id))}</textarea>`}
function line(labelEn,labelKo,id,phEn='',phKo=''){return `<label>${tr(labelEn,labelKo)}</label><input value="${esc(get(id))}" placeholder="${esc(tr(phEn,phKo))}" oninput="setVal('${id}',this.value)">`}
function stationSelect(){return `<label>${tr('Select Revelation text','요한계시록 본문 선택')}</label><select onchange="setText(this.value)">${DATA.coreTexts.map(t=>`<option value="${t.id}" ${t.id===state.text?'selected':''}>${t.n}. ${tr(t.refEn,t.refKo)} — ${tr(t.typeEn,t.typeKo)}</option>`).join('')}</select>`}
function scaffoldHtml(t){return `<div class="questionCard blue"><div class="questionLabel">${tr('Integration Movement Scaffold / How Meaning Moves','통합 움직임 스캐폴드 / 의미가 움직이는 방식')}</div><p>${esc(tr(t.scaffoldEn,t.scaffoldKo))}</p><div class="displayLine">TEXT<br>↓<br>${tr('tension / problem','긴장 / 문제')}<br>↓<br>${tr('movement / change','움직임 / 변화')}<br>↓<br>${tr('identity / community reshaping','정체성 / 공동체 재형성')}<br>↓<br>${tr('embodied participation','몸으로 구현되는 참여')}</div></div>`}
function renderWelcome(){return `<div class="hero"><span class="pill">${tr('Active Learning','능동 학습')}</span><h1>${tr('Enter Revelation as a First-Century Text-World','요한계시록의 1세기 본문 세계 안으로 들어가기')}</h1><p class="subtitle">${tr('This app does not ask students to decode a modern prediction chart. It asks students to enter Revelation’s first-century symbolic world, trace revelatory movement, and practice faithful witness before God.','이 앱은 학생들에게 현대 예측 도표를 해독하라고 요구하지 않습니다. 요한계시록의 1세기 상징 세계에 들어가 드러냄의 움직임을 추적하고 하나님 앞에서 충실한 증언을 실천하게 합니다.')}</p></div><div class="grid two"><div class="card"><h3>${tr('AI Rule','AI 규칙')}</h3><p>${tr('AI is an exegetical guide, movement coach, and interpretive dialogue partner. It must ask questions, not generate final answers.','AI는 주해 안내자, 움직임 코치, 해석 대화 파트너입니다. 최종 답을 생성하지 않고 질문해야 합니다.')}</p></div><div class="card"><h3>${tr('Student Rule','학생 규칙')}</h3><p>${tr('Write your first answer before using AI. Then paste AI coaching questions and record how your reading changed.','AI를 사용하기 전에 먼저 자신의 첫 답변을 작성하세요. 그 다음 AI 코칭 질문을 붙여넣고 자신의 읽기가 어떻게 바뀌었는지 기록하세요.')}</p></div></div><div class="card warning"><h3>${tr('Avoid','피하기')}</h3><ul><li>${tr('Do not ask first: Which current event does this symbol predict?','먼저 묻지 마세요: 이 상징은 어떤 현재 사건을 예측하는가?')}</li><li>${tr('Do not detach symbols from the first-century churches and Roman imperial world.','상징을 1세기 교회와 로마 제국 세계에서 분리하지 마세요.')}</li><li>${tr('Do not turn the Lamb’s victory into coercive Christian triumphalism.','어린양의 승리를 강압적 그리스도교 승리주의로 바꾸지 마세요.')}</li></ul></div>`}
function renderToolkit(){let rows=DATA.glossary.slice(0,8).map(g=>`<tr><td><strong>${esc(g.term)}</strong></td><td>${esc(state.lang==='ko'?g.ko:g.en)}</td></tr>`).join('');return `<div class="hero"><h1>${tr('Revelation Method Toolkit','요한계시록 방법 툴킷')}</h1><p class="subtitle">${tr('Stay inside triple genre, first-century context, historical coding, literary structure, theological transfer, and witness formation.','삼중 장르, 1세기 맥락, 역사적 상징 해독, 문학 구조, 신학적 전이, 증인 형성 안에 머무르세요.')}</p></div><div class="grid three"><div class="card"><h3>WHERE</h3><p>${esc(DATA.meta[state.lang].where)}</p></div><div class="card"><h3>WHO</h3><p>${esc(DATA.meta[state.lang].who)}</p></div><div class="card"><h3>WHAT</h3><p>${esc(DATA.meta[state.lang].what)}</p></div></div><div class="card"><h3>${tr('Method Steps','방법 단계')}</h3><ol><li>${tr('Name all three genres: apocalypse, prophecy, and epistle.','세 장르를 모두 명명하세요: 묵시, 예언, 서신.')}</li><li>${tr('Reconstruct the seven churches’ Roman imperial setting before identifying a contemporary analogy.','현대 유비를 식별하기 전에 일곱 교회의 로마 제국 배경을 재구성하세요.')}</li><li>${tr('Decode numbers, beasts, cities, colors, and visions through the Old Testament and first-century symbolic world.','구약과 1세기 상징 세계를 통해 숫자, 짐승, 도성, 색, 환상을 해독하세요.')}</li><li>${tr('Trace how the throne, the Lamb, Babylon, judgment, and new creation reshape communal allegiance and endurance.','보좌, 어린양, 바벨론, 심판, 새 창조가 공동체의 충성과 인내를 어떻게 재형성하는지 추적하세요.')}</li><li>${tr('Move to contemporary practice only after historical decoding and theological transfer are clear.','역사적 상징 해독과 신학적 전이가 분명해진 뒤에만 현대 실천으로 이동하세요.')}</li></ol></div><div class="card"><h3>${tr('Individual Setup','개인 설정')}</h3><div class="grid two"><div>${line('Student Name','학생 이름','studentName')}${line('Student ID','학번','studentId')}${line('Email optional','이메일 선택','studentEmail')}</div><div><label>${tr('Class Route','분반')}</label><select onchange="setVal('classRoute',this.value)">${['BH'].map(x=>`<option value="${x}" ${(get('classRoute')||'BH')===x?'selected':''}>${x}</option>`).join('')}</select>${input('One adaptive insight','적응형 학습 통찰 하나','adaptiveInsight','One insight from adaptive learning...','적응형 학습에서 얻은 통찰...',true)}</div></div></div><div class="card"><h3>${tr('Key Terms','핵심 용어')}</h3><table class="table"><tr><th>${tr('Term','용어')}</th><th>${tr('Meaning','의미')}</th></tr>${rows}</table></div>`}
function renderStation(){let html=`<div class="hero"><h1>${tr('Core Text Station','핵심 본문 스테이션')}</h1><p class="subtitle">${tr('Choose one Revelation text for individual and group work.','개인 및 그룹 작업을 위해 요한계시록 본문 하나를 선택하세요.')}</p></div><div class="card">${stationSelect()}</div>`;['Tuesday','Friday'].forEach(day=>{html+=`<div class="card"><h2>${tr(day,day==='Tuesday'?'화요일':'금요일')}</h2><div class="grid three">`+DATA.coreTexts.filter(t=>t.dayEn===day).map(t=>`<div class="textCard ${state.text===t.id?'active':''}" onclick="setText('${t.id}')"><span class="pill">${tr(t.dayEn,t.dayKo)}</span><h3>${t.n}. ${esc(tr(t.refEn,t.refKo))}</h3><p>${esc(tr(t.typeEn,t.typeKo))}</p></div>`).join('')+`</div></div>`});return html}
function renderFirst(){const t=text();return `<div class="hero"><h1>${tr('Individual Starting Point','개인 첫 답변')}</h1><p class="subtitle">${tr('Write before AI. Stay inside Revelation’s first-century text-world before moving toward today.','AI 전에 먼저 쓰세요. 오늘로 이동하기 전에 요한계시록의 1세기 본문 세계 안에 머무르세요.')}</p></div><div class="card">${stationSelect()}<h2>${esc(tr(t.refEn,t.refKo))}</h2><span class="pill">${esc(tr(t.typeEn,t.typeKo))}</span></div><div class="card"><div class="questionLabel">${tr('Exegetical Question','주해 질문')}</div><p>${esc(tr(t.exeEn,t.exeKo))}</p>${input('My first exegetical answer','나의 첫 주해 답변','firstExe','Name triple genre, first-century context, symbolic source, tension, and text-world location.','삼중 장르, 1세기 맥락, 상징 원천, 긴장, 본문 세계의 위치를 명명하세요.')}</div><div class="card"><div class="questionLabel">${tr('Hermeneutical Question','해석학 질문')}</div><p>${esc(tr(t.herEn,t.herKo))}</p>${input('My first hermeneutical answer','나의 첫 해석학 답변','firstHer','Move carefully from historical symbol and theological affirmation to communal practice today.','역사적 상징과 신학적 확언에서 오늘의 공동체 실천으로 조심스럽게 이동하세요.')}</div><div class="card">${scaffoldHtml(t)}${input('My How Meaning Moves notes','나의 의미 움직임 메모','firstMove','TEXT → genre/category → tension/problem → movement/change → identity/community reshaping → embodied participation','본문 → 장르/범주 → 긴장/문제 → 움직임/변화 → 정체성/공동체 재형성 → embodied participation')}</div>`}
function firstAnswerLines(){return [tr('EXEGESIS / TEXT-WORLD OBSERVATION:','주해 / 본문 세계 관찰:'),get('firstExe')||tr('[not written yet]','[아직 작성하지 않음]'),'',tr('HERMENEUTICS / TODAY’S COMMUNAL MEANING:','해석학 / 오늘 공동체 의미:'),get('firstHer')||tr('[not written yet]','[아직 작성하지 않음]'),'',tr('HOW MEANING MOVES:','의미가 움직이는 방식:'),get('firstMove')||tr('[not written yet]','[아직 작성하지 않음]')];}
function promptLines(kind){const t=text();if(state.lang==='ko'){let base=['당신은 답을 대신 만드는 기계가 아니라 요한계시록 해석 코치입니다.','',`본문: ${t.refKo} — ${t.typeKo}`,'','우리의 첫 답변:',...firstAnswerLines(),'','최종 답을 먼저 주지 마세요. 강점 2개를 말한 뒤, 3–5개의 질문을 던지고 수정 방향을 도와주세요.'];if(kind==='movement')return base.concat(['','다음 움직임 질문을 사용하세요:','- 묵시, 예언, 서신의 세 장르가 어떻게 함께 작동합니까?','- 어떤 구약 이미지와 1세기 로마 상황이 상징을 해독합니까?','- 본문 안에서 제국의 주장과 하나님의 주장은 어디서 충돌합니까?','- 독자는 예측 소비자에서 어떤 증인 공동체로 재형성됩니까?','- 어떤 구체적인 ὑπομονή의 실천이 의미를 몸으로 드러냅니까?']);return base.concat(['','다음 원칙으로 코칭하세요:','- 상징을 현대 뉴스나 기술에 먼저 대응시키지 마세요.','- 원래 일곱 교회, 로마 제국, 구약 상징 저장고에서 시작하세요.','- 역사적 상징과 시대를 건너는 신학적 확언을 구별하세요.','- 어린양의 승리를 강압적 승리주의로 바꾸지 마세요.','- 학생의 최종 답을 대신 쓰지 마세요.']);}let base=['You are our Revelation interpretive coach, not our answer generator.','',`Text: ${t.refEn} — ${t.typeEn}`,'','Our first answer:',...firstAnswerLines(),'','Do not give the final answer first. Name two strengths, ask 3–5 questions, and help us revise.'];if(kind==='movement')return base.concat(['','Use these movement questions:','- How do apocalypse, prophecy, and epistle work together?','- Which Old Testament images and first-century Roman realities decode the symbols?','- Where do imperial claims and God’s claim collide inside the text?','- How is the reader reshaped from prediction consumer into a witness-community?','- What concrete practice of hypomone embodies the meaning?']);return base.concat(['','Coach with these rules:','- Do not match symbols to current headlines or technologies first.','- Begin with the seven churches, Roman empire, and Old Testament symbolic reservoir.','- Distinguish historical symbols from transferable theological affirmations.','- Do not turn the Lamb’s victory into coercive triumphalism.','- Do not write our final answer for us.']);}
function promptHtml(kind){let lines=promptLines(kind),out='',list=false;lines.forEach(line=>{if(line===''){if(list){out+='</ul>';list=false}return}if(line.startsWith('- ')){if(!list){out+='<ul>';list=true}out+=`<li>${esc(line.slice(2))}</li>`}else{if(list){out+='</ul>';list=false}out+=`<p>${esc(line)}</p>`}});if(list)out+='</ul>';return out}
function copyPrompt(kind){navigator.clipboard.writeText(promptLines(kind).join('\n')).then(()=>toast(tr('Prompt copied','프롬프트 복사됨')))}
function renderCoach(){return `<div class="hero"><h1>${tr('AI Interpretive Coach','AI 해석 코치')}</h1><p class="subtitle">${tr('AI asks historically grounded, genre-sensitive Revelation questions. It does not generate prediction charts or final answers.','AI는 역사에 근거하고 장르에 민감한 요한계시록 질문을 합니다. 예측 도표나 최종 답을 생성하지 않습니다.')}</p></div><div class="card">${stationSelect()}</div><div class="grid two"><div class="card"><h3>${tr('Revelation Coach Prompt','요한계시록 코치 프롬프트')}</h3><div class="promptBox">${promptHtml('basic')}</div><button class="primary" onclick="copyPrompt('basic')">${tr('Copy Prompt','프롬프트 복사')}</button>${input('Paste AI coaching questions here','AI 코칭 질문을 여기에 붙여넣기','aiCoach','Paste questions, not final answers.','최종 답이 아니라 질문을 붙여넣으세요.',true)}</div><div class="card"><h3>${tr('Movement Coach Prompt','움직임 코치 프롬프트')}</h3><div class="promptBox">${promptHtml('movement')}</div><button class="primary" onclick="copyPrompt('movement')">${tr('Copy Prompt','프롬프트 복사')}</button>${input('Paste AI movement questions here','AI 움직임 질문을 여기에 붙여넣기','aiMovement','Paste movement questions and revision suggestions.','움직임 질문과 수정 제안을 붙여넣으세요.',true)}</div></div>`}
function renderRevision(){return `<div class="hero"><h1>${tr('Individual Revision','개인 수정')}</h1><p class="subtitle">${tr('Record what changed after AI coaching.','AI 코칭 후 무엇이 바뀌었는지 기록하세요.')}</p></div><div class="card">${stationSelect()}${input('What changed after AI coaching?','AI 코칭 후 무엇이 바뀌었는가?','revisionNotes','I first thought..., but the coach asked..., so I revised...','처음에는 ...라고 생각했지만, 코치가 ...라고 물어서 ...로 수정했다.')}</div>`}
function renderGroup(){return `<div class="hero"><h1>${tr('Group Dialogue + Setup','그룹 대화 + 설정')}</h1><p class="subtitle">${tr('Stage 2 begins with roles and comparison.','2단계는 역할과 비교로 시작합니다.')}</p></div><div class="card success"><h3>${tr('Group Setup','그룹 설정')}</h3><div class="grid two"><div>${line('Group Name','그룹명','groupName')}${line('Members','구성원','members')}</div><div>${line('Reader','읽기 담당','reader')}${line('Scribe','기록 담당','scribe')}${line('AI Operator','AI 담당','operator')}${line('Presenter','발표 담당','presenter')}</div></div></div><div class="card">${stationSelect()}${input('What was similar among our answers?','우리 답변의 공통점은 무엇인가?','groupSimilar','We all noticed...','우리 모두 ...을/를 보았다.',true)}${input('What was different?','무엇이 달랐는가?','groupDifferent','One difference was...','한 가지 차이는 ...였다.',true)}</div>`}
function renderTension(){return `<div class="hero"><h1>${tr('Compare + Tension Map','비교 + 긴장 지도')}</h1><p class="subtitle">${tr('Do not erase disagreement too quickly. Tension is interpretive data.','불일치를 너무 빨리 지우지 마세요. 긴장은 해석 자료입니다.')}</p></div><div class="card">${stationSelect()}${input('Our main interpretive tension','우리의 핵심 해석 긴장','groupTension','The main tension between our readings is...','우리 읽기 사이의 핵심 긴장은 ...이다.')}</div><div class="grid three"><div class="card"><h3>WHERE</h3><p>${tr('Did groups locate the Revelation text differently within empire, worship, persecution, or new creation?','그룹들이 요한계시록 본문을 제국, 예배, 박해, 새 창조 안에서 서로 다르게 위치시켰습니까?')}</p></div><div class="card"><h3>WHO</h3><p>${tr('Did groups name different speakers, silenced voices, or formed identities?','그룹들이 서로 다른 화자, 침묵된 목소리, 형성되는 정체성을 명명했습니까?')}</p></div><div class="card"><h3>WHAT</h3><p>${tr('Did groups move toward different embodied practices?','그룹들이 서로 다른 embodied practice로 이동했습니까?')}</p></div></div>`}
function renderGroupAI(){return `<div class="hero"><h1>${tr('Group AI Dialogue','그룹 AI 대화')}</h1><p class="subtitle">${tr('Ask AI to deepen the group tension, not erase it.','AI에게 그룹 긴장을 지우지 말고 깊게 하도록 요청하세요.')}</p></div><div class="card">${stationSelect()}<div class="promptBox">${promptHtml('movement')}</div><button class="primary" onclick="copyPrompt('movement')">${tr('Copy Group Prompt','그룹 프롬프트 복사')}</button>${input('Paste AI group coaching here','AI 그룹 코칭 붙여넣기','groupAI','Paste questions and revision suggestions, not final answers.','최종 답이 아니라 질문과 수정 제안을 붙여넣으세요.')}</div>`}
function renderFinal(){const t=text();return `<div class="hero"><h1>${tr('Final Group Synthesis + Presentation Card','최종 그룹 종합 + 발표 카드')}</h1><p class="subtitle">${tr('Synthesize text-world movement, contemporary meaning, and embodied participation.','본문 세계의 움직임, 오늘의 의미, embodied participation을 종합하세요.')}</p></div><div class="card">${stationSelect()}${scaffoldHtml(t)}${input('Final integrated group answer','최종 통합 그룹 답변','finalAnswer','Use the scaffold. Do not write a modern prediction detached from Revelation’s genre and first-century context.','스캐폴드를 사용하세요. 요한계시록의 장르와 1세기 맥락에서 분리된 현대 예측을 쓰지 마세요.')}${input('Concrete embodied practice','구체적 embodied practice','embodiedPractice','Name one practice for class, community, work, citizenship, economic pressure, witness, or endurance.','수업, 공동체, 일, 시민성, 경제적 압력, 증언, 인내에서 실천할 하나를 명명하세요.',true)}</div><div class="card">${input('Presentation Card','발표 카드','galleryCard','Text / Genre / Historical code / Tension / Movement / Witness-community / Practice','본문 / 장르 / 역사적 상징 / 긴장 / 움직임 / 증인 공동체 / 실천')}${input('One question for another group','다른 그룹에게 묻고 싶은 질문 하나','peerQuestion','What question should others ask us?','다른 그룹이 우리에게 어떤 질문을 해 주면 좋을까요?',true)}</div>`}
function exportObj(){const t=text();const lang=state.lang;return {timestamp:new Date().toISOString(),course:DATA.meta.course,week:DATA.meta.week,topic:DATA.meta.topic,language:lang,selectedText:t.id,selectedRef:tr(t.refEn,t.refKo),route:get('classRoute')||'BH',student:{name:get('studentName'),id:get('studentId'),email:get('studentEmail')},group:{name:get('groupName'),members:get('members'),reader:get('reader'),scribe:get('scribe'),operator:get('operator'),presenter:get('presenter')},answers:{exegetical:get('firstExe'),hermeneutical:get('firstHer'),integrationMovement:get('firstMove'),revisionNotes:get('revisionNotes'),finalSynthesis:get('finalAnswer'),embodiedPractice:get('embodiedPractice'),presentationCard:get('galleryCard'),peerQuestion:get('peerQuestion')},reflections:{aiCoach:get('aiCoach'),aiMovement:get('aiMovement'),groupSimilar:get('groupSimilar'),groupDifferent:get('groupDifferent'),groupTension:get('groupTension'),groupAI:get('groupAI')},progress:{visited:[...state.visited],percent:document.getElementById('progressText').textContent},metadata:{exportType:'active-language-only',route:get('classRoute')||'BH',createdBy:'BH Week15 Revelation Active App'}}}
function download(name,text,type){const blob=new Blob([text],{type});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=name;document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url)}
async function submitToSheets(){const url=document.getElementById('scriptUrl')?.value.trim();if(!url){toast(tr('Paste Apps Script /exec URL first','먼저 Apps Script /exec URL을 붙여넣으세요'));return}localStorage.setItem(LS+':scriptUrl',url);const payload=exportObj();try{await fetch(url,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)});toast(tr('Submitted. Check Google Sheet tab.','제출되었습니다. 구글시트 탭을 확인하세요.'))}catch(e){toast(tr('Submission failed. Download JSON backup.','제출 실패. JSON 백업을 다운로드하세요.'))}}
function renderExport(){const obj=exportObj();const route=obj.route||'BH';const fname=`${DATA.meta.week}_${route}_${state.lang}.json`;return `<div class="hero"><h1>${tr('Submit + Download','제출 + 다운로드')}</h1><p class="subtitle">${tr('Student JSON export is active-language only and normalized.','학생 JSON 내보내기는 현재 언어만 포함하며 정규화되어 있습니다.')}</p></div><div class="card"><h3>${tr('Google Sheets Submission','구글시트 제출')}</h3><label>${tr('Apps Script Web App URL ending in /exec','/exec로 끝나는 Apps Script Web App URL')}</label><input id="scriptUrl" value="${esc(localStorage.getItem(LS+':scriptUrl')||'')}" placeholder="https://script.google.com/macros/s/.../exec"><button class="primary" onclick="submitToSheets()">${tr('Submit to Google Sheet','구글시트로 제출')}</button></div><div class="card"><h3>${tr('Backup Export','백업 내보내기')}</h3><div class="row"><button class="primary" onclick="download('${fname}', JSON.stringify(exportObj(),null,2),'application/json')">${tr('Download JSON','JSON 다운로드')}</button><button onclick="navigator.clipboard.writeText(JSON.stringify(exportObj(),null,2)).then(()=>toast(tr('Copied','복사됨')))">${tr('Copy JSON','JSON 복사')}</button><button onclick="window.print()">${tr('Print / PDF','인쇄 / PDF')}</button><button onclick="if(confirm(tr('Clear all saved work?','저장된 모든 작업을 지울까요?'))){Object.keys(localStorage).filter(k=>k.startsWith(LS)).forEach(k=>localStorage.removeItem(k));location.reload()}">${tr('Reset','초기화')}</button></div><label>${tr('Download JSON Export Preview','JSON 내보내기 미리보기')}</label><textarea readonly style="min-height:420px">${esc(JSON.stringify(obj,null,2))}</textarea></div>`}
function render(){renderChrome();let html='';if(state.active==='welcome')html=renderWelcome();if(state.active==='toolkit')html=renderToolkit();if(state.active==='station')html=renderStation();if(state.active==='first')html=renderFirst();if(state.active==='coach')html=renderCoach();if(state.active==='revision')html=renderRevision();if(state.active==='group')html=renderGroup();if(state.active==='tension')html=renderTension();if(state.active==='groupai')html=renderGroupAI();if(state.active==='final')html=renderFinal();if(state.active==='export')html=renderExport();let idx=navItems.findIndex(n=>n[0]===state.active);let prev=navItems[Math.max(0,idx-1)][0],next=navItems[Math.min(navItems.length-1,idx+1)][0];html+=`<div class="footerNav no-print"><button onclick="go('${prev}')">← ${tr('Previous','이전')}</button><button class="primary" onclick="go('${next}')">${tr('Next','다음')} →</button></div>`;document.getElementById('screen').innerHTML=html;updateProgress()}
render();
</script>
